name: Publish Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-local-container:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and extract latest Chrome Fleet release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url=$(gh api repos/remotebrowser/chromefleet/releases/latest \
            --jq '.assets[] | select(.name | endswith("linux-64bit.zip")) | .browser_download_url')
          curl -fsSL -o release.zip "$url"
          unzip release.zip -d app
          chmod +x app/chromefleet/chromefleet

      - name: Run Chrome Fleet
        run: app/chromefleet/chromefleet 2>&1 | tee chromefleet.log &

      - name: Wait until Chrome Fleet is ready
        run: while ! curl -s 'http://localhost:8300/health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Create a test browser container
        run: curl -s -X POST http://localhost:8300/api/v1/browsers/xyz123

      - run: docker build -t getgather .

      - run: docker run -d --network host --name getgather -e CHROMEFLEET_URL getgather
        env:
          CHROMEFLEET_URL: http://localhost:8300
        timeout-minutes: 3

      - name: Run the health check validation
        run: while ! curl -s 'http://localhost:23456/health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Run the extended health check validation
        run: while ! curl -s 'http://localhost:23456/extended-health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Get the container logs
        run: docker logs --details getgather
        if: always()

      - name: Show Chrome Fleet logs
        run: cat chromefleet.log
        if: always()

      - name: Show Chrome Fleet logs
        run: cat chromefleet.log
        if: always()

  build-and-publish:
    runs-on: ubuntu-22.04
    needs: test-local-container
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  test-published-container:
    runs-on: ubuntu-22.04
    needs: build-and-publish
    timeout-minutes: 5

    steps:
      - name: Download and extract latest Chrome Fleet release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url=$(gh api repos/remotebrowser/chromefleet/releases/latest \
            --jq '.assets[] | select(.name | endswith("linux-64bit.zip")) | .browser_download_url')
          curl -fsSL -o release.zip "$url"
          unzip release.zip -d app
          chmod +x app/chromefleet/chromefleet

      - name: Run Chrome Fleet
        run: app/chromefleet/chromefleet 2>&1 | tee chromefleet.log &

      - name: Wait until Chrome Fleet is ready
        run: while ! curl -s 'http://localhost:8300/health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Create a test browser container
        run: curl -s -X POST http://localhost:8300/api/v1/browsers/xyz123

      - name: Run the container
        run: docker run -d --rm --network host --name getgather -e CHROMEFLEET_URL ${{ env.REGISTRY }}/${{ env.IMAGE_NAME
          }}:latest
        env:
          CHROMEFLEET_URL: http://localhost:8300

      - name: Run the health check validation
        run: while ! curl -s 'http://localhost:23456/health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Run the extended health check validation
        run: while ! curl -s 'http://localhost:23456/extended-health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Get the container logs
        run: docker logs --details getgather
        if: always()

      - name: Show Chrome Fleet logs
        run: cat chromefleet.log
        if: always()
