name: MCP Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mcp-pytest:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Chrome Fleet
        uses: ./.github/actions/run-chromefleet
        timeout-minutes: 5

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Build MCP container
        run: |
          docker container rm -f getgather 2>/dev/null || true
          docker build --network=host -t getgather .

      - name: Run MCP container
        run: |
          docker run --network host --name getgather -d \
            -e CHROMEFLEET_URL="http://localhost:8300" \
            getgather
        timeout-minutes: 3

      - name: Run the health check validation
        run: while ! curl -s 'http://localhost:23456/health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Run the extended health check validation
        run: while ! curl -s 'http://localhost:23456/extended-health' | grep 'OK'; do sleep 1; done
        timeout-minutes: 3

      - name: Run MCP tests
        run: uv run pytest -m "mcp" -s -p no:xdist
        env:
          HOST: http://localhost:23456
          BBC_EMAIL: ${{ secrets.BBC_EMAIL }}
          BBC_PASSWORD: ${{ secrets.BBC_PASSWORD }}
          GOODREADS_EMAIL: ${{ secrets.GOODREADS_EMAIL }}
          GOODREADS_PASSWORD: ${{ secrets.GOODREADS_PASSWORD }}
          WAYFAIR_EMAIL: ${{ secrets.WAYFAIR_EMAIL }}
          WAYFAIR_PASSWORD: ${{ secrets.WAYFAIR_PASSWORD }}

      - name: Dump getgather container logs
        if: always()
        run: docker logs getgather || true
