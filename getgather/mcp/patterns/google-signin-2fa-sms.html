<html gg-domain="google" gg-priority="2">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <div
      gg-match="div[jsname='dMNVAe':contains(normalize-space(.), 'A text message with a 6-digit verification code')]"
    ></div>
    <input
      autofocus
      name="Pin"
      type="tel"
      gg-match="input#idvPin"
      placeholder="Enter the code"
      aria-label="Enter the code"
    />
    <button type="submit" gg-match="//button[@jsname='LgbsSe']">Next</button>
  </body>
</html>
