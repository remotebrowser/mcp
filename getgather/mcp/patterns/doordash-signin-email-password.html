<html gg-domain="doordash">
  <head>
    <title>Doordash Sign In Email & Password</title>
  </head>
  <body>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      gg-match="form#guided-email-password-form input[type=email]"
    />
    <input
      autofocus
      name="password"
      type="password"
      placeholder="Password"
      gg-match="form#guided-email-password-form input[type=password]"
    />
    <button type="submit" gg-match="button#login-submit-button">Continue to sign in</button>
    <p
      id="error"
      style="color: red"
      gg-optional
      gg-match="form#guided-email-password-form div[data-anchor-id=IdentityErrorBanner]"
    />
  </body>
</html>
