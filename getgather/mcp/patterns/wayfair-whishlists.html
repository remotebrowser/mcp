<html gg-domain="wayfair">
  <body>
    <div>
      <div gg-match="div[data-hb-id='BoxV3'] > h1[data-cypress-id='page-title']"></div>
      <div
        gg-match="div[data-hb-id='BoxV3'] div.ListCard a[data-hb-id='Card'] div.ListCardImages"
      ></div>
      <div
        gg-convert="wayfair-whishlists.json"
        gg-match-html="//div[@data-hb-id='Wrapper'][contains(., 'My Lists')]"
        gg-stop
      ></div>
    </div>
  </body>
</html>
