<html gg-domain="amazon" gg-priority="4">
  <body>
    <h4
      gg-stop
      gg-error="incorrect_password"
      gg-match="div#auth-error-message-box h4.a-alert-heading"
    >
      There was a problem
    </h4>
    <div gg-match="div#auth-error-message-box div.a-alert-content"></div>
    <input gg-match="input#ap_password" name="none" style="display: none" />
  </body>
</html>
