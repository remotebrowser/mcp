<html gg-domain="doordash">
  <head>
    <title>Doordash Sign In Email</title>
  </head>
  <body>
    <input
      autofocus
      name="email"
      type="email"
      placeholder="Email"
      gg-match="form#login-form-guided-email input[type=email]"
    />
    <button type="submit" gg-match="button#guided-submit-button">Continue to sign in</button>
    <p
      id="error"
      style="color: red"
      gg-optional
      gg-match="form#login-form-guided-email span[id$=:r2:-error]"
    />
  </body>
</html>
