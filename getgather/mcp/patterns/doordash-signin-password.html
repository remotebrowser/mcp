<html gg-domain="doordash">
  <head>
    <title>Doordash Sign In Password</title>
  </head>
  <body>
    <input
      autofocus
      id="doordash-password"
      name="password"
      type="password"
      placeholder="Password"
      gg-match="form#login-form input[type=password]"
    />
    <button type="submit" gg-match="button#login-submit-button">Sign in</button>
    <p
      id="error"
      style="color: red"
      gg-optional
      gg-match="form#login-form div[data-anchor-id=IdentityErrorBanner]"
    />
  </body>
</html>
