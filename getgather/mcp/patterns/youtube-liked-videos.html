<html gg-domain="youtube">
  <body>
    <div gg-stop gg-match="ytd-playlist-video-list-renderer"></div>
    <div gg-stop gg-match-html="ytd-playlist-video-list-renderer"></div>
    <script type="application/json" id="liked_videos">
      {
        "rows": "ytd-playlist-video-renderer",
        "columns": [
          {
            "name": "title",
            "selector": "a#video-title"
          },
          {
            "name": "url",
            "selector": "a#video-title",
            "attribute": "href"
          },
          {
            "name": "thumbnail",
            "selector": "ytd-thumbnail a#thumbnail img",
            "attribute": "src"
          },
          {
            "name": "channel",
            "selector": "ytd-channel-name yt-formatted-string#text a"
          },
          {
            "name": "views_and_date",
            "selector": "yt-formatted-string#video-info"
          },
          {
            "name": "duration",
            "selector": "badge-shape .yt-badge-shape__text"
          }
        ]
      }
    </script>
  </body>
</html>
