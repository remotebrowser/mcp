<html gg-domain="google">
  <head>
    <title>Google Activity</title>
  </head>

  <body>
    <span
      gg-optional
      gg-match="//section/div/div/div/div/div/span[@jsslot][contains(normalize-space(), 'Forgot password?')]"
    ></span>

    <input
      autofocus
      placeholder="Password"
      gg-match="input[name='Passwd']"
      type="password"
      name="password"
    />
    <button type="submit" gg-match="//div[@id='passwordNext']//button">Next</button>
  </body>
</html>
