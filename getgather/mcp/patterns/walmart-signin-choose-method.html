<html gg-domain="walmart" gg-priority="0">
  <head>
    <title>Walmart sign in method</title>
  </head>
  <body>
    <div gg-match="[data-testid='auth-choice-title']"></div>
    <div class="vertical-radios">
      <div class="radio-wrapper">
        <input
          gg-optional
          type="radio"
          name="signin-method"
          id="wm-method-sms"
          value="otp"
          data-wm-value="otp"
          gg-match="input[name='otp'][type='radio']"
        />
        <div>
          <label for="wm-method-sms">Text me a verification code</label>
          <span gg-optional gg-match="input[name='otp'] ~ span .f6.db"></span>
        </div>
      </div>
      <div class="radio-wrapper">
        <input
          gg-optional
          type="radio"
          name="signin-method"
          id="wm-method-email-otp"
          value="otpEmail"
          data-wm-value="otpEmail"
          gg-match="input[name='otpEmail'][type='radio']"
        />
        <div>
          <label for="wm-method-email-otp">Email me a verification code</label>
          <span gg-optional gg-match="input[name='otpEmail'] ~ span .f6.db"></span>
        </div>
      </div>
      <div class="radio-wrapper">
        <input
          gg-optional
          type="radio"
          name="signin-method"
          id="wm-method-password"
          value="password"
          data-wm-value="password"
          gg-match="input[name='password'][type='radio']"
        />
        <div>
          <label for="wm-method-password">Password</label>
        </div>
      </div>
    </div>
    <div id="wm-password-section"></div>
    <button id="wm-submit" type="submit" disabled>Choose a method above</button>
    <script>
      function updateSignInMethod(value) {
        console.log(">> value", value);
        const submit = document.getElementById("wm-submit");
        const passwordSection = document.getElementById("wm-password-section");

        if (value === "password") {
          if (!passwordSection.querySelector("input[name='password']")) {
            const input = document.createElement("input");
            input.autofocus = true;
            input.type = "password";
            input.name = "password";
            input.placeholder = "Password";
            input.setAttribute(
              "gg-match",
              "form#sign-in-form input[name='password'][type='password']",
            );
            passwordSection.appendChild(input);
            input.focus();
          }
          submit.textContent = "Sign in";
          submit.disabled = false;
        } else if (value) {
          const existing = passwordSection.querySelector("input[name='password']");
          if (existing) existing.remove();
          submit.textContent = "Request code";
          submit.disabled = false;
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        // Restore values from data-wm-value since distill engine overwrites the value attribute
        document.querySelectorAll("input[data-wm-value]").forEach((radio) => {
          radio.value = radio.dataset.wmValue;
        });

        document.addEventListener("change", (e) => {
          console.log(">> e.target.name", e.target.name);
          if (e.target.name === "signin-method") {
            console.log(">> e.target.value", e.target.value);
            updateSignInMethod(e.target.value);
          }
        });

        const checked = document.querySelector("input[name='signin-method']:checked");
        if (checked) updateSignInMethod(checked.value);
      });
    </script>
  </body>
</html>
