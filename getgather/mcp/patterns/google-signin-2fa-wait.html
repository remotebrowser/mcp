<html gg-domain="google">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <span gg-match="//span[contains(normalize-space(.), '2-Step Verification')]"></span>
    <div
      gg-match="//div[@class='dMNVAe' and contains(normalize-space(.), 'Google sent a notification to your')]"
    ></div>
    <p
      gg-match="//samp[contains(@class, 'Sevzkc')]"
      gg-optional
      style="font-size: 2rem; font-weight: bold; text-align: center; margin: 1rem 0"
    ></p>

    <input type="text" value="submit" name="submit" style="display: none" />
    <button type="submit" gg-autoclick>I've done this</button>
  </body>
</html>
