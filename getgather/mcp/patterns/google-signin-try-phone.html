<html gg-domain="google" gg-priority="2">
  <head>
    <title>Google Activity</title>
  </head>
  <body>
    <span gg-match="//span[contains(normalize-space(.), 'Choose how you want to sign in:')]"></span>
    <div gg-match="div[aria-disabled='true'][data-challengeunavailable='true']"></div>
    <div gg-autoclick gg-match="div[data-action='selectchallenge'][data-sendmethod='SMS']">
      Get a verification code
    </div>
  </body>
</html>
