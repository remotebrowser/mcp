<html gg-domain="youtube">
  <body>
    <div gg-stop gg-match="yt-lockup-view-model, ytm-shorts-lockup-view-model-v2"></div>
    <div gg-stop gg-match-html="ytd-section-list-renderer"></div>
    <script type="application/json" id="watch_history">
      {
        "rows": "yt-lockup-view-model, ytm-shorts-lockup-view-model-v2",
        "columns": [
          {
            "name": "title",
            "selector": "h3 a span"
          },
          {
            "name": "url",
            "selector": "h3 a",
            "attribute": "href"
          },
          {
            "name": "thumbnail",
            "selector": "yt-thumbnail-view-model img",
            "attribute": "src"
          },
          {
            "name": "channel",
            "selector": "yt-content-metadata-view-model .yt-content-metadata-view-model__metadata-row:first-child span:first-child"
          },
          {
            "name": "views",
            "selector": "yt-content-metadata-view-model .yt-content-metadata-view-model__delimiter + span, .shortsLockupViewModelHostOutsideMetadataSubhead span"
          },
          {
            "name": "duration",
            "selector": "badge-shape .yt-badge-shape__text"
          }
        ]
      }
    </script>
  </body>
</html>
