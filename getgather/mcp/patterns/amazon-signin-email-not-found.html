<html gg-domain="amazon">
  <head>
    <title>Amazon email not found</title>
  </head>
  <body>
    <h4
      gg-stop
      gg-error="email_not_found"
      gg-match-html="//*[@id='auth-error-message-box']//div[@class='a-alert-content' and contains(normalize-space(.), 'cannot find an account with that email address')]"
    >
      We cannot find an account with that email address
    </h4>
  </body>
</html>
