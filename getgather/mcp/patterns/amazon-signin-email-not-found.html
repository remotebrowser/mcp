<html gg-domain="amazon">
  <head>
    <title>Amazon email not found (server-side error)</title>
  </head>
  <body>
    <h4
      gg-stop
      gg-error="email_not_found"
      gg-match-html="//*[@id='auth-error-message-box']//h4[contains(normalize-space(.), 'There was a problem')]"
    >
      There was a problem
    </h4>
  </body>
</html>
