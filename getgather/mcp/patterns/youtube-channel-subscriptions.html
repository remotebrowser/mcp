<html gg-domain="youtube">
  <body>
    <h1 gg-match="ytd-channel-renderer"></h1>
    <div
      gg-convert="youtube-channel-subscriptions.json"
      gg-match="ytd-channel-renderer a.channel-link[href^='/@']"
      gg-stop
    ></div>
    <div gg-match-html="ytd-section-list-renderer" gg-stop></div>
  </body>
</html>
